<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sushiro ล่าแต้ม</title>
  <style>
    :root {
      --bg: #fafafa;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #111827;
      --goldText: #d97706;
      --pink: #ec4899;
      --pinkDark: #db2777;
      --green: #16a34a;
      --greenBg: #dcfce7;
      --greenDark: #15803d;
      --amber: #f59e0b;
      --red: #ef4444;
      --shadow: 0 7px 20px rgba(17, 24, 39, 0.07);
      --radius: 17px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.18;
    }

    button, input, select {
      touch-action: manipulation;
      font-family: inherit;
    }

    .app {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 10px 11px 84px;
    }

    .hero {
      padding: 4px 2px 6px;
    }

    .hero h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.02;
      letter-spacing: -1px;
      font-weight: 950;
    }

    .hero p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .settings-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 9px;
      box-shadow: 0 3px 10px rgba(17, 24, 39, 0.04);
      margin: 5px 0 7px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      gap: 7px;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 3px;
    }

    input, select {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 9px;
      font-size: 15px;
      background: white;
      color: var(--text);
      outline: none;
    }

    .summary {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(250, 250, 250, 0.94);
      backdrop-filter: blur(12px);
      padding: 5px 0 7px;
    }

    .summary-card {
      background: linear-gradient(180deg, #ffffff, #f8fafc);
      border: 1px solid var(--line);
      border-radius: 21px;
      box-shadow: var(--shadow);
      padding: 10px;
      transition: background 0.8s ease, border-color 0.8s ease;
    }

    .summary-card.on-target {
      background: linear-gradient(180deg, #ecfdf5, #dcfce7);
      border: 2px solid var(--green);
    }

    .main-total {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 7px;
      margin-bottom: 6px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .total-number {
      font-size: 42px;
      line-height: 0.92;
      font-weight: 950;
      letter-spacing: -1.5px;
      color: var(--goldText);
    }

    .summary-card.on-target .total-number {
      color: var(--greenDark);
    }

    .baht {
      font-size: 14px;
      color: var(--muted);
      font-weight: 800;
      margin-left: 3px;
    }

    .points-pill {
      padding: 7px 10px;
      background: #111827;
      color: white;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 850;
      white-space: nowrap;
    }

    .summary-card.on-target .points-pill {
      background: var(--greenDark);
    }

    .target-status {
      margin: 0 0 7px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12.5px;
      font-weight: 900;
      background: #fef3c7;
      color: #92400e;
    }

    .target-status.good {
      background: #bbf7d0;
      color: #166534;
    }

    .target-status.bad {
      background: #fee2e2;
      color: #991b1b;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 5px;
    }

    .mini-box {
      background: rgba(243, 244, 246, 0.9);
      border-radius: 13px;
      padding: 7px;
    }

    .summary-card.on-target .mini-box {
      background: rgba(255, 255, 255, 0.72);
    }

    .mini-box strong {
      display: block;
      margin-top: 1px;
      font-size: 16px;
      line-height: 1;
    }

    .progress-wrap {
      margin-top: 7px;
    }

    .progress-line {
      height: 7px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #111827;
      border-radius: 999px;
      transition: width 0.2s ease, background 0.2s ease;
    }

    .progress-bar.on-target {
      background: var(--greenDark);
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      margin-top: 3px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 750;
    }

    .section {
      margin-top: 10px;
    }

    .section-title {
      margin: 0 0 6px;
      font-size: 17px;
      font-weight: 900;
      letter-spacing: -0.2px;
    }

    .plate-card {
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: var(--radius);
      padding: 8px 9px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 10px rgba(17, 24, 39, 0.035);
    }

    .plate-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .plate-dot {
      width: 29px;
      height: 29px;
      border-radius: 999px;
      border: 2px solid rgba(0,0,0,0.12);
      flex: 0 0 auto;
    }

    .plate-name {
      font-weight: 900;
      font-size: 16px;
      line-height: 1.05;
    }

    .plate-price {
      color: var(--muted);
      font-size: 12px;
      margin-top: 0;
    }

    .counter {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-round {
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 999px;
      font-size: 21px;
      font-weight: 950;
      color: white;
      background: #111827;
      cursor: pointer;
    }

    .count {
      width: 28px;
      text-align: center;
      font-size: 22px;
      font-weight: 950;
    }

    .white { background: #ffffff; border-color: #d1d5db; }
    .red { background: #fee2e2; border-color: #ef4444; }
    .silver { background: #f3f4f6; border-color: #9ca3af; }
    .gold { background: #fef3c7; border-color: #f59e0b; }
    .black { background: #111827; border-color: #374151; color: white; }
    .dot-white { background: #ffffff; }
    .dot-red { background: #ef4444; }
    .dot-silver { background: linear-gradient(135deg, #f9fafb, #9ca3af); }
    .dot-gold { background: linear-gradient(135deg, #fde68a, #f59e0b); }
    .dot-black { background: #111827; border-color: #6b7280; }
    .black .plate-price { color: #d1d5db; }

    .section-total {
      margin-top: 1px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 14px;
      padding: 8px 9px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 7px;
    }

    .section-total span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .section-total strong {
      color: var(--goldText);
      font-size: 18px;
      font-weight: 950;
      white-space: nowrap;
    }

    .custom-card, .result-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 9px;
      box-shadow: 0 2px 10px rgba(17, 24, 39, 0.035);
    }

    .custom-row {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr 0.75fr 36px;
      gap: 5px;
      align-items: center;
      margin-top: 5px;
    }

    .remove-btn {
      height: 38px;
      border: none;
      border-radius: 12px;
      background: #fee2e2;
      color: #b91c1c;
      font-weight: 950;
      font-size: 18px;
      cursor: pointer;
    }

    .wide-btn {
      width: 100%;
      height: 42px;
      border: none;
      border-radius: 13px;
      background: #f3f4f6;
      color: #111827;
      border: 1px solid var(--line);
      font-weight: 900;
      font-size: 14px;
      cursor: pointer;
      margin-top: 7px;
    }

    .result-card {
      margin-bottom: 7px;
    }

    .result-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 11.5px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.green { background: #dcfce7; color: #166534; }
    .badge.amber { background: #fef3c7; color: #92400e; }
    .badge.red { background: #fee2e2; color: #991b1b; }

    .result-title {
      font-size: 16px;
      font-weight: 950;
      margin: 0 0 2px;
      line-height: 1.1;
    }

    .result-items {
      margin: 4px 0 0;
      color: var(--text);
      font-weight: 800;
      line-height: 1.28;
      font-size: 14px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      margin-top: 7px;
    }

    .result-metric {
      background: #f9fafb;
      border-radius: 12px;
      padding: 7px;
    }

    .result-metric span {
      display: block;
      font-size: 11.5px;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.1;
    }

    .result-metric strong {
      display: block;
      margin-top: 1px;
      font-size: 18px;
      font-weight: 950;
      line-height: 1.02;
    }

    .gold-amount {
      color: var(--goldText);
      font-weight: 950;
    }

    .warning {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      border-radius: 13px;
      padding: 9px;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 7px;
      line-height: 1.28;
    }

    .empty {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.28;
      background: #f9fafb;
      border: 1px dashed #d1d5db;
      border-radius: 14px;
      padding: 9px;
    }

    .bottom-actions {
      position: fixed;
      left: 50%;
      bottom: 11px;
      transform: translateX(-50%);
      width: min(498px, calc(100% - 22px));
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      z-index: 20;
    }

    .bottom-actions button {
      height: 48px;
      border-radius: 16px;
      border: none;
      font-size: 15px;
      font-weight: 950;
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .reset {
      background: #ffffff;
      color: #111827;
      border: 1px solid var(--line) !important;
    }

    .jump {
      background: linear-gradient(135deg, var(--pink), var(--pinkDark));
      color: white;
    }

    @media (max-width: 360px) {
      .hero h1 { font-size: 31px; }
      .total-number { font-size: 38px; }
      .btn-round { width: 36px; height: 36px; }
      .settings-grid { grid-template-columns: 1fr; }
      .custom-row { grid-template-columns: 1fr 0.7fr 0.65fr 34px; gap: 4px; }
      input, select { font-size: 14px; padding: 0 8px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>🍣 Sushiro ล่าแต้ม</h1>
      <p>คำนวณยอด + แนะนำกินเพิ่มให้คุ้มแต้มทุก 100 บาท</p>
    </header>

    <section class="settings-card">
      <div class="settings-grid">
        <div class="field">
          <label>ยอดส่วนต่างไม่เกิน</label>
          <input id="overLimit" type="number" min="0" value="30" oninput="calculate()" />
        </div>
        <div class="field">
          <label>ตัวเลือกความคุ้มค่า</label>
          <select id="optimizeBy" onchange="calculate()">
            <option value="best">คุ้มสุด</option>
            <option value="leastOver">เกินเป้าน้อยสุด</option>
            <option value="leastMoney">เพิ่มเงินน้อยสุด</option>
            <option value="leastPlate">จำนวนจานน้อยสุด</option>
          </select>
        </div>
      </div>
    </section>

    <section class="summary">
      <div id="summaryCard" class="summary-card">
        <div class="main-total">
          <div>
            <div class="label">ยอดจ่ายจริง</div>
            <div><span id="realTotal" class="total-number">0</span><span class="baht">บาท</span></div>
          </div>
          <div id="pointPill" class="points-pill">0 แต้ม</div>
        </div>

        <div id="targetStatus" class="target-status bad">❌ ยังไม่คุ้ม</div>

        <div class="mini-grid">
          <div class="mini-box">
            <div class="label">ก่อน SC รวม</div>
            <strong><span id="subtotal">0</span></strong>
          </div>
          <div class="mini-box">
            <div class="label">SC 10%</div>
            <strong><span id="service">0</span></strong>
          </div>
          <div class="mini-box">
            <div class="label" id="gapLabel">ขาดอีก</div>
            <strong><span id="gapAmount">100</span></strong>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-line"><div id="progressBar" class="progress-bar"></div></div>
          <div class="progress-text">
            <span id="currentHundred">0</span>
            <span id="nextHundred">100</span>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">จำนวนจาน</h2>
      <div id="plates"></div>
      <div class="section-total">
        <span>ยอดรวมจาน</span>
        <strong><span id="plateSubtotal">0</span> บาท</strong>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">เมนูอื่น ๆ</h2>
      <div class="custom-card">
        <div id="customItems"></div>
        <button class="wide-btn" onclick="addCustomItem()">+ เพิ่มเมนูเอง</button>
      </div>
      <div class="section-total">
        <span>ยอดรวมเมนูอื่น ๆ</span>
        <strong><span id="customSubtotal">0</span> บาท</strong>
      </div>
    </section>

    <section class="section" id="resultsSection">
      <h2 class="section-title">🎯 ตัวเลือกกินเพิ่ม</h2>
      <div id="warningBox"></div>
      <div id="results"></div>
    </section>
  </main>

  <div class="bottom-actions">
    <button class="reset" onclick="resetAll()">รีเซ็ต</button>
    <button class="jump" onclick="document.getElementById('resultsSection').scrollIntoView({behavior:'smooth'})">ดูคำแนะนำ</button>
  </div>

  <script>
    let lastTouchEndForZoomLock = 0;
    document.addEventListener("touchend", function(event) {
      const now = Date.now();
      if (now - lastTouchEndForZoomLock <= 350) event.preventDefault();
      lastTouchEndForZoomLock = now;
    }, { passive: false });

    document.addEventListener("gesturestart", function(event) {
      event.preventDefault();
    });

    const plates = [
      { key: "white", name: "จานขาว", price: 30, cls: "white", dot: "dot-white" },
      { key: "red", name: "จานแดง", price: 40, cls: "red", dot: "dot-red" },
      { key: "silver", name: "จานเงิน", price: 60, cls: "silver", dot: "dot-silver" },
      { key: "gold", name: "จานทอง", price: 80, cls: "gold", dot: "dot-gold" },
      { key: "black", name: "จานดำ", price: 100, cls: "black", dot: "dot-black" }
    ];

    let counts = {};
    let customItems = [];
    plates.forEach(p => counts[p.key] = 0);

    function money(n) {
      return Math.round(n).toLocaleString("th-TH");
    }

    function realTotalFromSubtotal(subtotal) {
      return subtotal * 1.10;
    }

    function renderPlates() {
      const box = document.getElementById("plates");
      box.innerHTML = plates.map(p => `
        <div class="plate-card ${p.cls}">
          <div class="plate-left">
            <div class="plate-dot ${p.dot}"></div>
            <div>
              <div class="plate-name">${p.name}</div>
              <div class="plate-price">${p.price} บาท</div>
            </div>
          </div>
          <div class="counter">
            <button class="btn-round" onclick="changeCount('${p.key}', -1)">−</button>
            <div class="count" id="count-${p.key}">${counts[p.key]}</div>
            <button class="btn-round" onclick="changeCount('${p.key}', 1)">+</button>
          </div>
        </div>
      `).join("");
    }

    function changeCount(key, delta) {
      counts[key] = Math.max(0, counts[key] + delta);
      document.getElementById(`count-${key}`).textContent = counts[key];
      calculate();
    }

    function addCustomItem() {
      customItems.push({ name: "", price: 0, qty: 1 });
      renderCustomItems();
      calculate();
    }

    function updateCustom(index, field, value) {
      if (field === "name") customItems[index].name = value;
      if (field === "price") customItems[index].price = Math.max(0, Number(value || 0));
      if (field === "qty") customItems[index].qty = Math.max(0, Number(value || 0));
      calculate();
    }

    function removeCustomItem(index) {
      customItems.splice(index, 1);
      renderCustomItems();
      calculate();
    }

    function renderCustomItems() {
      const box = document.getElementById("customItems");
      if (customItems.length === 0) {
        box.innerHTML = `<div class="empty">เพิ่มเมนูที่ไม่ใช่จานสี เช่น น้ำ ของหวาน ราเมน หรือเมนูพิเศษ</div>`;
        return;
      }

      box.innerHTML = customItems.map((item, i) => `
        <div class="custom-row">
          <input placeholder="ชื่อเมนู" value="${item.name}" oninput="updateCustom(${i}, 'name', this.value)" />
          <input type="number" min="0" placeholder="ราคา" value="${item.price || ""}" oninput="updateCustom(${i}, 'price', this.value)" />
          <input type="number" min="0" placeholder="จำนวน" value="${item.qty}" oninput="updateCustom(${i}, 'qty', this.value)" />
          <button class="remove-btn" onclick="removeCustomItem(${i})">×</button>
        </div>
      `).join("");
    }

    function getPlateSubtotal() {
      let total = 0;
      plates.forEach(p => total += counts[p.key] * p.price);
      return total;
    }

    function getCustomSubtotal() {
      let total = 0;
      customItems.forEach(item => total += (Number(item.price) || 0) * (Number(item.qty) || 0));
      return total;
    }

    function findOptions(currentSubtotal, target, overLimit) {
      const options = [];
      const maxEach = 10;

      for (let w = 0; w <= maxEach; w++) {
        for (let r = 0; r <= maxEach; r++) {
          for (let s = 0; s <= maxEach; s++) {
            for (let g = 0; g <= maxEach; g++) {
              for (let b = 0; b <= maxEach; b++) {
                const combo = [w, r, s, g, b];
                const totalPlates = combo.reduce((a, c) => a + c, 0);
                if (totalPlates === 0) continue;

                const addSubtotal = combo.reduce((sum, c, i) => sum + c * plates[i].price, 0);
                const newSubtotal = currentSubtotal + addSubtotal;
                const newReal = realTotalFromSubtotal(newSubtotal);
                const over = newReal - target;

                if (newReal >= target) {
                  const items = combo
                    .map((c, i) => c > 0 ? `${plates[i].name.replace("จาน", "")} ${c} จาน` : "")
                    .filter(Boolean);

                  options.push({
                    items,
                    addSubtotal,
                    newSubtotal,
                    newReal,
                    points: Math.floor(newReal / 100),
                    over,
                    totalPlates,
                    withinLimit: over <= overLimit
                  });
                }
              }
            }
          }
        }
      }

      const unique = new Map();
      options.forEach(o => {
        const key = o.items.join("|");
        if (!unique.has(key)) unique.set(key, o);
      });

      return Array.from(unique.values());
    }

    function sortOptions(options, mode) {
      return options.sort((a, b) => {
        if (mode === "leastOver") return a.over - b.over || a.addSubtotal - b.addSubtotal || a.totalPlates - b.totalPlates;
        if (mode === "leastMoney") return a.addSubtotal - b.addSubtotal || a.over - b.over || a.totalPlates - b.totalPlates;
        if (mode === "leastPlate") return a.totalPlates - b.totalPlates || a.over - b.over || a.addSubtotal - b.addSubtotal;
        return (a.withinLimit === b.withinLimit ? 0 : a.withinLimit ? -1 : 1)
          || a.over - b.over
          || a.addSubtotal - b.addSubtotal
          || a.totalPlates - b.totalPlates;
      });
    }

    function updateTargetStatus(realTotal, currentHundred, nextHundred, overLimit) {
      const summaryCard = document.getElementById("summaryCard");
      const targetStatus = document.getElementById("targetStatus");
      const progressBar = document.getElementById("progressBar");
      const gapLabel = document.getElementById("gapLabel");
      const gapAmount = document.getElementById("gapAmount");

      const overCurrent = realTotal - currentHundred;
      const gapToNext = nextHundred - realTotal;
      const isOnTarget = currentHundred >= 100 && overCurrent <= overLimit;

      summaryCard.classList.toggle("on-target", isOnTarget);
      progressBar.classList.toggle("on-target", isOnTarget);

      if (isOnTarget) {
        targetStatus.className = "target-status good";
        targetStatus.textContent = `✅ ตามเป้าแล้ว • เกินเป้า ${money(overCurrent)} บาท`;
        gapLabel.textContent = "เกินเป้า";
        gapAmount.textContent = money(overCurrent);
      } else if (gapToNext <= 50) {
        targetStatus.className = "target-status";
        targetStatus.textContent = `⚠️ ใกล้ถึงแล้ว • ขาดอีก ${money(gapToNext)} บาท`;
        gapLabel.textContent = "ขาดอีก";
        gapAmount.textContent = money(gapToNext);
      } else {
        targetStatus.className = "target-status bad";
        targetStatus.textContent = `❌ ยังไม่คุ้ม • ขาดอีก ${money(gapToNext)} บาท`;
        gapLabel.textContent = "ขาดอีก";
        gapAmount.textContent = money(gapToNext);
      }
    }

    function calculate() {
      const plateSubtotal = getPlateSubtotal();
      const customSubtotal = getCustomSubtotal();
      const subtotal = plateSubtotal + customSubtotal;
      const service = subtotal * 0.10;
      const realTotal = realTotalFromSubtotal(subtotal);
      const points = Math.floor(realTotal / 100);
      const currentHundred = points * 100;
      const nextHundred = (points + 1) * 100;
      const progress = ((realTotal - currentHundred) / 100) * 100;

      document.getElementById("plateSubtotal").textContent = money(plateSubtotal);
      document.getElementById("customSubtotal").textContent = money(customSubtotal);
      document.getElementById("subtotal").textContent = money(subtotal);
      document.getElementById("service").textContent = money(service);
      document.getElementById("realTotal").textContent = money(realTotal);
      document.getElementById("pointPill").textContent = `🎯 ${points} แต้ม`;
      document.getElementById("currentHundred").textContent = money(currentHundred);
      document.getElementById("nextHundred").textContent = money(nextHundred);
      document.getElementById("progressBar").style.width = `${Math.min(100, Math.max(0, progress))}%`;

      const overLimit = Number(document.getElementById("overLimit").value || 30);
      const optimizeBy = document.getElementById("optimizeBy").value;

      updateTargetStatus(realTotal, currentHundred, nextHundred, overLimit);

      let options = findOptions(subtotal, nextHundred, overLimit);
      const within = options.filter(o => o.withinLimit);
      const source = within.length ? within : options;

      document.getElementById("warningBox").innerHTML = within.length ? "" : `
        <div class="warning">⚠️ ไม่มีตัวเลือกที่เกินไม่เกิน ${money(overLimit)} บาท จึงแสดงตัวเลือกที่ใกล้ที่สุดแทน</div>
      `;

      const sorted = sortOptions(source, optimizeBy).slice(0, 50);
      renderResults(sorted, nextHundred, overLimit);
    }

    function renderResults(options, target, overLimit) {
      const box = document.getElementById("results");

      if (!options.length) {
        box.innerHTML = `<div class="empty">เริ่มกดจำนวนจาน หรือเพิ่มเมนูเอง แล้วระบบจะแนะนำตัวเลือกให้ทันที</div>`;
        return;
      }

      box.innerHTML = options.map((o, i) => {
        const badgeClass = o.over <= 10 ? "green" : o.over <= overLimit ? "amber" : "red";
        const badgeText = o.over <= overLimit ? `เกิน ${money(o.over)} บาท` : `เกินเงื่อนไข ${money(o.over)} บาท`;

        return `
          <div class="result-card">
            <div class="result-top">
              <div>
                <p class="result-title">${i === 0 ? "⭐ ตัวเลือกแนะนำ" : `ตัวเลือก ${i + 1}`}</p>
                <div class="result-items">${o.items.join(" + ")}</div>
              </div>
              <span class="badge ${badgeClass}">${badgeText}</span>
            </div>

            <div class="result-grid">
              <div class="result-metric">
                <span>เพิ่มก่อน SC</span>
                <strong>${money(o.addSubtotal)} บาท</strong>
              </div>
              <div class="result-metric">
                <span>ก่อน SC ใหม่</span>
                <strong>${money(o.newSubtotal)} บาท</strong>
              </div>
              <div class="result-metric">
                <span>ยอดจ่ายจริงใหม่</span>
                <strong class="gold-amount">${money(o.newReal)} บาท</strong>
              </div>
              <div class="result-metric">
                <span>แต้มใหม่</span>
                <strong>${o.points} แต้ม</strong>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    function resetAll() {
      plates.forEach(p => counts[p.key] = 0);
      customItems = [];
      renderPlates();
      renderCustomItems();
      calculate();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    renderPlates();
    renderCustomItems();
    calculate();
  </script>
</body>
</html>
